loops:
  prompt_loop:
    artifact_kind: prompt
    max_rounds: 3
    score_threshold: 90
    stagnation_rounds: 2
    stagnation_epsilon: 0.5
    swap_next_round: false
    swap_on_failure: false
    role_assignment:
      strategy: static
      implementers: [claude_primary]
      reviewers: [claude_primary]
      implementer_count: 1
      reviewer_count: 1
    eval_commands:
      - "echo 'prompt loop rubric check done'"
